spring.application.name=api-gateway

server.port=8765

jwt.secret=mojbardzoTrudnyINikomuNiewiadomykluczdoktoregoniktniemadostepu
eureka.client.service-url.http://service-registry:8761/eureka/

spring.cloud.gateway.server.webmvc.enabled=true
spring.cloud.gateway.server.webmvc.http-client.type=simple

spring.web.cors.allowed-origins=http://localhost:3000


spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true


spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=user-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/users/**

spring.cloud.gateway.server.webmvc.routes[2].id=product-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/products/**

spring.cloud.gateway.server.webmvc.routes[3].id=order-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://ORDER-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/orders/**

spring.cloud.gateway.server.webmvc.routes[4].id=payment-service
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/payments/**
