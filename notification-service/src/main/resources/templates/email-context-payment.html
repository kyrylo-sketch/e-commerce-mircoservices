<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Potwierdzenie płatności</title>
</head>

<body style="font-family: Arial, sans-serif; background-color:#f4f6f8; padding:20px;">

<div style="
    max-width:600px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    border:1px solid #e6e6e6;
">

    <h2 style="color:#222;">
        Potwierdzenie płatności 💳
    </h2>

    <p>
        Twoja płatność została zarejestrowana w systemie.
    </p>

    <div style="
        background:#f8f9fa;
        padding:15px;
        border-radius:8px;
        margin-top:20px;
    ">

        <h3 style="margin-top:0;">Szczegóły płatności</h3>

        <p><b>Numer zamówienia:</b> {{orderId}}</p>

        <p><b>Status płatności:</b> {{status}}</p>

        <p><b>Kwota:</b> {{price}} PLN</p>

        <p><b>Data płatności:</b> {{paymentDate}}</p>

    </div>

    <div style="
        margin-top:20px;
        padding:15px;
        background:#e9f5ff;
        border-radius:8px;
        border-left:4px solid #2196f3;
    ">

        <p style="margin:0;">
            {{message}}
        </p>

    </div>

    <p style="
        margin-top:30px;
        font-size:12px;
        color:#888;
    ">
        To jest automatyczna wiadomość — prosimy na nią nie odpowiadać.
    </p>

</div>

</body>
</html>
