name: Build and Deploy User Service

on:
  push:
    branches:
      - main
    paths:
      - "user-service/**"

jobs:
  build-deploy:
    name: Build and Deploy User Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'corretto'
          cache: 'maven'

      - name: Unit Test
        run: mvn -B test --file user-service/pom.xml

      - name: Build the application
        run: mvn -B clean package --file user-service/pom.xml -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./user-service
          push: true
          file: ./user-service/Dockerfile
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/user-service:${{ github.sha }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/user-service:latest