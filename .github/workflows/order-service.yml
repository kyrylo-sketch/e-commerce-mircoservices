name: Build and Deploy Order Service

on:
  push:
    branches:
      - main
    paths:
      - "order-service/**"

jobs:
  build-deploy:
    name: Build and Deploy Order Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'corretto'
          cache: 'maven'

      - name: Unit Test
        run: mvn -B test --file order-service/pom.xml

      - name: Build the Application
        run: mvn -B clean package --file order-service/pom.xml -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v3
        with:
          context: ./order-service
          push: true
          file: ./order-service/Dockerfile
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/order-service-ecommerce:${{ github.sha }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/order-service-ecommerce:latest